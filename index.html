<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>머더 미스터리 기록</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3ED;font-family:"Noto Sans KR",sans-serif;color:#1C1612}
input,textarea,select,button{font-family:inherit;box-sizing:border-box}
input,textarea,select{outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#E5D9C8;border-radius:2px}
.fade{animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hov{transition:all .18s;cursor:pointer}
.hov:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(92,60,24,.13)}
.btn{cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn:hover{filter:brightness(.92)}
.spoiler{filter:blur(5px);cursor:pointer;transition:filter .3s;user-select:none}
.spoiler:hover,.spoiler:focus{filter:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── 설정 (앱스크립트 배포 주소를 이곳에 넣으세요!) ──────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbx2Ts05VryaaglaifwzF_gLr46azD4eDBKDdA1iPEwtYmssG82dX_ZYXh0PK6IJN9k3/exec"; // ← 앱스크립트 URL 입력

// ── 색상 팔레트 ───────────────────────────────────
const C={
  bg:"#F7F3ED",paper:"#FFFDF9",card:"#FFFFFF",
  border:"#E5D9C8",text:"#1C1612",sub:"#6B5E52",muted:"#A8978A",
  gold:"#B45309",goldL:"#FEF3C7",goldB:"#FDE68A",
  red:"#B91C1C",redL:"#FEE2E2",green:"#15803D",greenL:"#DCFCE7",
  sh:"0 2px 12px rgba(92,60,24,.08)",shL:"0 6px 24px rgba(92,60,24,.13)"
};

// ── 9유형 정의 ────────────────────────────────────
const TYPES={
  "냉철한 지휘관":{icon:"🧊",color:"#1D4ED8",bg:"#DBEAFE",axis:[0,0],str:"증거 기반 판세 장악",weak:"팀원 감정 배려 부족"},
  "노련한 해결사":{icon:"⚖️",color:"#059669",bg:"#D1FAE5",axis:[1,0],str:"논리·직감 균형",weak:"결정이 느릴 수 있음"},
  "대담한 도발가":{icon:"⚡",color:"#D97706",bg:"#FEF3C7",axis:[2,0],str:"직감 돌파력",weak:"오판 시 팀 혼란"},
  "치밀한 분석가":{icon:"🔍",color:"#7C3AED",bg:"#EDE9FE",axis:[0,1],str:"단서 정리·체계화",weak:"결론 도출 느림"},
  "균형의 조율가":{icon:"🤝",color:"#0891B2",bg:"#CFFAFE",axis:[1,1],str:"중재·합의 도출",weak:"개성이 묻힐 수 있음"},
  "공감형 몰입가":{icon:"🎭",color:"#BE185D",bg:"#FCE7F3",axis:[2,1],str:"캐릭터 몰입·연기",weak:"객관 판단 어려움"},
  "침묵의 추적자":{icon:"🕵️",color:"#374151",bg:"#F3F4F6",axis:[0,2],str:"결정적 증거 포착",weak:"소통 부족"},
  "신중한 관망가":{icon:"🔭",color:"#92400E",bg:"#FEF3C7",axis:[1,2],str:"한 방 타이밍",weak:"기회 놓칠 수 있음"},
  "예리한 심리술사":{icon:"🔮",color:"#5B21B6",bg:"#EDE9FE",axis:[2,2],str:"심리 독해",weak:"직관 과신 위험"},
};

function calcType(answers){
  const styleMap={A:0,B:1,C:2};
  const h=[0,0,0],v=[0,0,0];
  [0,1,2].forEach(i=>{ if(answers[i]) h[styleMap[answers[i]]]++; });
  [3,4,5].forEach(i=>{ if(answers[i]) v[styleMap[answers[i]]]++; });
  const hIdx=h.indexOf(Math.max(...h));
  const vIdx=v.indexOf(Math.max(...v));
  return Object.entries(TYPES).find(([,t])=>t.axis[0]===hIdx&&t.axis[1]===vIdx)?.[0]||"균형의 조율가";
}

const QUESTIONS=[
  {q:"단서를 발견하면?",opts:["다른 증거와 논리적으로 연결한다","일단 적어두고 전체 그림을 그린다","느낌상 수상한 사람부터 의심한다"]},
  {q:"밀실에서 시체 발견! 첫 행동은?",opts:["현장을 샅샅이 뒤져 물리적 증거 확보","증거도 보고 사람들 반응도 살핀다","표정·말투에서 모순을 찾는다"]},
  {q:"범인을 지목할 때 더 믿는 건?",opts:["빈틈없는 증거 체인","증거 + 직감 둘 다","확신이 드는 직감"]},
  {q:"게임 중 내 포지션은?",opts:["수사를 이끄는 리더","의견을 모으는 조율자","조용히 관찰하는 잠복자"]},
  {q:"내가 범인이 됐을 때 전략은?",opts:["정면돌파 — 주도권 잡기","자연스럽게 섞여 의심 분산","최대한 눈에 안 띄게 잠수"]},
  {q:"토론이 격해질 때 나는?",opts:["앞장서서 논쟁을 정리한다","양쪽을 중재해 합의를 만든다","한발 물러나 흐름을 지켜본다"]},
];
const SUBQ=[
  "머더미스터리에서 나만의 필살기나 플레이 스타일을 한 줄로 표현한다면?",
  "같이 하면 최고일 것 같은 스타일 / 최악일 것 같은 스타일은?",
];

// ── 문법 에러 수정 완료된 API 함수 ──────────────────────────────────────
async function gs(action, data=null, id=null, prompt=null){
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  if(data) url.searchParams.set("data", JSON.stringify(data));
  if(id!==null) url.searchParams.set("id", String(id));
  if(prompt) url.searchParams.set("prompt", prompt);

  const r = await fetch(url.toString());
  const j = await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}

async function gemini(prompt){
  return await gs("callGemini", null, null, prompt);
}

// ── 공통 UI 컴포넌트 ──────────────────────────────
const inp={width:"100%",padding:"10px 14px",background:C.paper,
  border:`1.5px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:14};

function Btn({onClick,children,full,sm,outline,red,disabled}){
  const base={padding:sm?"5px 12px":full?"12px":"8px 20px",borderRadius:8,
    fontSize:sm?12:14,fontWeight:700,width:full?"100%":"auto",
    cursor:disabled?"not-allowed":"pointer",border:"none",
    transition:"all .15s",opacity:disabled?.5:1};
  const style=outline
    ?{...base,background:"transparent",color:red?C.red:C.gold,border:`1.5px solid ${red?C.red:C.gold}`}
    :red?{...base,background:C.red,color:"#fff"}
    :{...base,background:disabled?"#E5D9C8":C.gold,color:disabled?C.muted:"#fff"};
  return <button className="btn" style={style} onClick={onClick} disabled={disabled}>{children}</button>;
}

function Card({children,style={},className="",onClick}){
  return <div className={className} onClick={onClick} style={{background:C.card,border:`1px solid ${C.border}`,
    borderRadius:14,padding:20,boxShadow:C.sh,...style}}>{children}</div>;
}

function Modal({title,onClose,children,wide}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(28,22,18,.55)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}}
      onClick={onClose}>
      <div style={{background:C.card,borderRadius:18,width:"100%",
        maxWidth:wide?640:480,maxHeight:"90vh",overflowY:"auto",
        boxShadow:"0 12px 48px rgba(92,60,24,.22)"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"18px 24px",borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:17,fontWeight:700,color:C.gold}}>{title}</span>
          <button className="btn" onClick={onClose}
            style={{background:"none",color:C.muted,fontSize:22,padding:"0 4px"}}>✕</button>
        </div>
        <div style={{padding:"20px 24px"}}>{children}</div>
      </div>
    </div>
  );
}

function TypeCard({typeName,showDetail=false}){
  const t=TYPES[typeName];
  if(!t) return null;
  return(
    <div style={{background:t.bg,border:`2px solid ${t.color}20`,borderRadius:12,
      padding:"14px 16px",textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:4}}>{t.icon}</div>
      <div style={{fontSize:16,fontWeight:900,color:t.color}}>{typeName}</div>
      {showDetail&&<>
        <div style={{fontSize:12,color:C.sub,marginTop:6}}>💪 <b>{t.str}</b></div>
        <div style={{fontSize:12,color:C.sub,marginTop:2}}>⚠️ {t.weak}</div>
      </>}
    </div>
  );
}

// ── 로그인 화면 ───────────────────────────────────
function Login({mbs,onLogin,onSignup,onRefresh}){
  const [id,setId]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const go=async()=>{
    if(!id.trim()||!pw.trim()){setErr("아이디와 비밀번호를 입력해주세요.");return;}
    setLoading(true);setErr("확인 중...");
    let list=[...mbs];
    try{
      const fresh=await gs("getMembers");
      if(fresh?.length) {list=fresh;onRefresh(fresh);}
    }catch(e){}
    const found=list.find(m=>String(m.name).trim()===id.trim());
    if(!found){setErr("존재하지 않는 아이디입니다.");setLoading(false);return;}
    if(String(found.pw).trim()!==String(pw).trim()){setErr("비밀번호가 틀렸습니다.");setLoading(false);return;}
    setLoading(false);onLogin(found);
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:360,background:C.card,borderRadius:22,padding:"44px 36px",border:`1px solid ${C.border}`,boxShadow:C.shL}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>🕯</div>
          <div style={{fontSize:22,fontWeight:900,color:C.gold}}>머더 미스터리 기록</div>
          <div style={{fontSize:11,color:C.muted,marginTop:4,letterSpacing:2}}>MURDER MYSTERY RECORD</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:8}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:5}}>아이디</label>
            <input value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="아이디 입력" style={inp}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:5}}>비밀번호</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="비밀번호 입력" style={inp}/>
          </div>
        </div>
        {err&&<div style={{fontSize:12,color:err==="확인 중..."?C.muted:C.red,textAlign:"center",margin:"8px 0",fontWeight:600}}>{err}</div>}
        <div style={{marginTop:14}}><Btn full onClick={go} disabled={loading}>로그인</Btn></div>
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0"}}>
          <div style={{flex:1,height:1,background:C.border}}/>
          <span style={{fontSize:11,color:C.muted}}>또는</span>
          <div style={{flex:1,height:1,background:C.border}}/>
        </div>
        <Btn full outline onClick={onSignup}>+ 새 계정 만들기</Btn>
      </div>
    </div>
  );
}

// ── 회원가입 ──────────────────────────────────────
function Signup({onDone,onBack,existingIds}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:"",pw:"",av:"🕵️"});
  const [ans,setAns]=useState(Array(6).fill(null));
  const [sub,setSub]=useState(["",""]);
  const [result,setResult]=useState(null);
  const [aiText,setAiText]=useState("");
  const [loading,setLoading]=useState(false);
  const total=9;
  const pct=Math.round((step/total)*100);
  const optLabels=["A","B","C"];

  const doAI=async(typeName,subAnswers)=>{
    setLoading(true);
    try{
      const prompt=`머더미스터리 플레이어 성향 분석.
유형: ${typeName}
${TYPES[typeName]?.str} 스타일의 플레이어입니다.
주관식1: ${subAnswers[0]||"(미입력)"}
주관식2: ${subAnswers[1]||"(미입력)"}
위 정보를 바탕으로 이 플레이어만의 개성 있는 별명(20자 이내), 핵심 강점 1줄, 핵심 약점 1줄, 추천 역할 1줄을 JSON으로만 답해줘.
{"nickname":"...","strength":"...","weakness":"...","role":"..."}`;
      const txt=await gemini(prompt);
      const match=txt.match(/\{[\s\S]*\}/);
      if(match) setAiText(JSON.parse(match[0]));
    }catch(e){setAiText(null);}
    setLoading(false);
  };

  const doCalc=async()=>{
    const abcAns=ans.map(a=>a!==null?optLabels[a]:null);
    const typeName=calcType(abcAns);
    setResult(typeName);
    setStep(8);
    doAI(typeName,sub);
  };

  const finish=async()=>{
    const id=existingIds.length?Math.max(...existingIds)+1:1;
    const member={id,name:form.name,pw:form.pw,av:form.av,
      role:"member",type:result,
      aiNickname:aiText?.nickname||"",
      strength:aiText?.strength||TYPES[result]?.str||"",
      weakness:aiText?.weakness||TYPES[result]?.weak||"",
      recRole:aiText?.role||"",friends:"[]",createdAt:new Date().toISOString().slice(0,10)};
    try{await gs("addMember",member);}catch(e){}
    onDone(member);
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:480,background:C.card,borderRadius:22,padding:"36px 32px",border:`1px solid ${C.border}`,boxShadow:C.shL}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:16,fontWeight:700,color:C.gold}}>🕯 탐정 등록</span>
          <span style={{fontSize:12,color:C.muted}}>Step {step+1}/{total}</span>
        </div>
        <div style={{height:5,background:C.border,borderRadius:3,marginBottom:26}}>
          <div style={{height:"100%",width:`${pct}%`,background:C.gold,borderRadius:3,transition:"width .4s"}}/>
        </div>

        {step===0&&<div className="fade">
          <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>기본 정보 입력</div>
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
            <div><label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:5}}>아이디 *</label><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="사용할 아이디" style={inp}/></div>
            <div><label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:5}}>비밀번호 *</label><input type="password" value={form.pw} onChange={e=>setForm(p=>({...p,pw:e.target.value}))} placeholder="비밀번호" style={inp}/></div>
            <div><label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:5}}>아바타 이모지</label>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:52,height:52,borderRadius:"50%",background:C.goldL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:`2px solid ${C.gold}`,flexShrink:0}}>{form.av||"🕵️"}</div>
                <input value={form.av} onChange={e=>setForm(p=>({...p,av:e.target.value}))} placeholder="예: 🦊" style={{...inp,width:"auto",flex:1}} maxLength={4}/>
              </div>
            </div>
          </div>
          <Btn full onClick={()=>setStep(1)} disabled={!form.name||!form.pw}>다음 →</Btn>
        </div>}

        {step>=1&&step<=6&&(()=>{
          const qi=step-1; const q=QUESTIONS[qi];
          return(
            <div className="fade">
              <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:8}}>Q{step} / 6 — 성향 분석</div>
              <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:18,lineHeight:1.6}}>{q.q}</div>
              <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:22}}>
                {q.opts.map((opt,i)=>{
                  const sel=ans[qi]===i;
                  return(
                    <div key={i} className="hov" onClick={()=>{const a=[...ans];a[qi]=i;setAns(a);}} style={{padding:"12px 16px",borderRadius:10,cursor:"pointer",border:`1.5px solid ${sel?C.gold:C.border}`,background:sel?C.goldL:C.paper,display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,background:sel?C.gold:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:sel?"#fff":C.sub}}>{optLabels[i]}</div>
                      <span style={{fontSize:13,color:C.text}}>{opt}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:9}}>
                <Btn outline onClick={()=>setStep(s=>s-1)}>← 이전</Btn>
                {step<6?<Btn full onClick={()=>setStep(s=>s+1)} disabled={ans[qi]===null}>다음 →</Btn>:<Btn full onClick={()=>setStep(7)} disabled={ans[qi]===null}>다음 →</Btn>}
              </div>
            </div>
          );
        })()}

        {step===7&&<div className="fade">
          <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:8}}>주관식 — AI 개인화 분석</div>
          <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:20}}>
            {SUBQ.map((q,i)=>(
              <div key={i}>
                <label style={{fontSize:13,fontWeight:600,color:C.text,display:"block",marginBottom:7,lineHeight:1.5}}>{q}</label>
                <textarea value={sub[i]} onChange={e=>{const s=[...sub];s[i]=e.target.value;setSub(s);}} style={{...inp,height:70,resize:"vertical"}} placeholder="자유롭게 작성 (선택)"/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:9}}>
            <Btn outline onClick={()=>setStep(6)}>← 이전</Btn>
            <Btn full onClick={doCalc}>결과 보기 ✨</Btn>
          </div>
        </div>}

        {step===8&&result&&<div className="fade">
          <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:14,fontWeight:700,color:C.muted,marginBottom:12}}>🎉 당신의 유형</div><TypeCard typeName={result} showDetail/></div>
          {loading&&<div style={{textAlign:"center",padding:"16px 0",color:C.muted,fontSize:13}}>🤖 AI가 개인 분석 중...</div>}
          {aiText&&!loading&&<div style={{background:C.goldL,borderRadius:10,padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:C.gold,marginBottom:8}}>✨ AI 개인 분석</div>
            <div style={{fontSize:13,color:C.text,lineHeight:1.8}}><div>🏷️ <b>{aiText.nickname}</b></div><div>💪 {aiText.strength}</div><div>⚠️ {aiText.weakness}</div><div>🎭 추천 역할: {aiText.role}</div></div>
          </div>}
          <Btn full onClick={finish} disabled={loading}>가입 완료 🎉</Btn>
          <div style={{marginTop:8}}><Btn full outline onClick={()=>setStep(1)}>다시 테스트</Btn></div>
        </div>}

        <div style={{textAlign:"center",marginTop:16}}><button className="btn" onClick={onBack} style={{fontSize:12,color:C.muted,background:"transparent"}}>← 로그인으로</button></div>
      </div>
    </div>
  );
}

// ── 사이드바 ──────────────────────────────────────
const NAV=[
  {id:"dash",ic:"🗂",l:"대시보드"},{id:"my",ic:"👤",l:"마이페이지"},{id:"fri",ic:"🤝",l:"친구&궁합"},{id:"crew",ic:"🏠",l:"모임 관리"},
  {id:"theme",ic:"📚",l:"테마 DB"},{id:"sch",ic:"📅",l:"일정·모집"},{id:"rec",ic:"🔮",l:"AI 추천"},{id:"hof",ic:"🏆",l:"명예의 전당"},
];

function Sidebar({page,setPage,me,badge,onLogout}){
  const t=TYPES[me?.type]||{};
  return(
    <div style={{width:210,background:C.card,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:15,fontWeight:900,color:C.gold}}>머더 미스터리 기록</div>
        <div style={{fontSize:9,color:C.muted,letterSpacing:2,marginTop:2}}>MURDER MYSTERY RECORD</div>
      </div>
      <nav style={{flex:1,padding:"8px 0"}}>
        {NAV.map(n=>{
          const act=page===n.id;
          return(
            <div key={n.id} className="hov" onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 18px",borderLeft:`3px solid ${act?C.gold:"transparent"}`,background:act?C.goldL:"transparent",color:act?C.gold:C.sub,fontSize:13,fontWeight:act?700:400,cursor:"pointer"}}>
              <span style={{fontSize:15}}>{n.ic}</span>{n.l}
              {n.id==="theme"&&badge>0&&<span style={{marginLeft:"auto",background:C.red,color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>{badge}</span>}
            </div>
          );
        })}
      </nav>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:t.bg||C.goldL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`2px solid ${t.color||C.gold}`,flexShrink:0}}>{me?.av||"🕵️"}</div>
          <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{me?.name}</div><div style={{fontSize:10,color:t.color||C.gold,fontWeight:600}}>{t.icon} {me?.type||"유형 미설정"}</div></div>
        </div>
        <button className="btn" onClick={onLogout} style={{width:"100%",padding:6,fontSize:11,color:C.muted,background:C.paper,border:`1px solid ${C.border}`,borderRadius:7}}>로그아웃</button>
      </div>
    </div>
  );
}

// ── 앱 루트 (LocalStorage로 유지 관리 적용) ───────────────────────────────────────
function App(){
  const [me,setMe]=useState(()=>{
    try{const s=localStorage.getItem("mm_me");return s?JSON.parse(s):null;}catch{return null;}
  });
  const [page,setPage]=useState(()=>{
    try{return localStorage.getItem("mm_page")||"dash";}catch{return "dash";}
  });
  const [auth,setAuth]=useState("login");
  const [mbs,setMbs]=useState([]);
  const [themes,setThemes]=useState([]);
  const [records,setRecords]=useState([]);
  const [schedules,setSchedules]=useState([]);
  const [modal,setModal]=useState(null);

  const goPage=p=>{setPage(p);try{localStorage.setItem("mm_page",p);}catch{}};
  const close=()=>setModal(null);
  const pending=themes.filter(t=>!t.ok&&t.status==="pending");

  useEffect(()=>{
    gs("getMembers").then(d=>{if(d?.length)setMbs(d);}).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(!me) return;
    gs("getThemes").then(d=>{if(d) setThemes(d.map(safeTheme));}).catch(()=>{});
    gs("getRecords").then(d=>{if(d) setRecords(d);}).catch(()=>{});
    gs("getSchedules").then(d=>{if(d) setSchedules(d);}).catch(()=>{});
  },[me]);

  function safeTheme(t){
    return{...t,ok:t.ok===true||t.ok==="TRUE"||t.ok==="true",
      tags:Array.isArray(t.tags)?t.tags:(typeof t.tags==="string"?t.tags.split(","):[]),
      diff:Number(t.diff)||3,time:Number(t.time)||120,rating:t.rating?Number(t.rating):null
    };
  }

  const login=m=>{
    setMe(m);
    try{localStorage.setItem("mm_me",JSON.stringify(m));}catch{}
    goPage("dash");
  };
  
  const logout=()=>{
    setMe(null);
    try{localStorage.removeItem("mm_me");localStorage.removeItem("mm_page");}catch{}
  };

  if(!me){
    if(auth==="signup") return <Signup onDone={m=>{setMbs(p=>[...p,m]);login(m);setAuth("login");}} onBack={()=>setAuth("login")} existingIds={mbs.map(m=>m.id).filter(Boolean).map(Number)}/>;
    return <Login mbs={mbs} onLogin={login} onSignup={()=>setAuth("signup")} onRefresh={setMbs}/>;
  }

  const props={me,mbs,setMbs,themes,setThemes,records,setRecords,schedules,setSchedules,goPage,modal,setModal,close};

  return(
    <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
      <Sidebar page={page} setPage={goPage} me={me} badge={me?.role==="admin"?pending.length:0} onLogout={logout}/>
      <main style={{flex:1,overflowY:"auto",padding:"32px 36px",minWidth:0}}>
        {page==="dash"  &&<Dash {...props}/>}
        {page==="my"    &&<MyPage {...props}/>}
        {page==="fri"   &&<Friends {...props}/>}
        {page==="crew"  &&<Crew {...props}/>}
        {page==="theme" &&<ThemeDB {...props}/>}
        {page==="sch"   &&<Schedule {...props}/>}
        {page==="rec"   &&<AIRec {...props}/>}
        {page==="hof"   &&<HoF {...props}/>}
      </main>
      {modal&&<ModalRouter {...props}/>}
    </div>
  );
}

// ── 모달 라우터 및 세부 컴포넌트들 ───────────────────────────────────
function ModalRouter(props){
  const{modal,close}=props;
  if(modal?.t==="addRecord")  return <Modal title="기록 추가" onClose={close}><RecordForm {...props}/></Modal>;
  if(modal?.t==="editRecord") return <Modal title="기록 수정" onClose={close}><RecordForm init={modal.d} {...props}/></Modal>;
  if(modal?.t==="addTheme")   return <Modal title="테마 제보" onClose={close} wide><ThemeForm {...props}/></Modal>;
  if(modal?.t==="addSch")     return <Modal title="일정 등록" onClose={close}><SchForm {...props}/></Modal>;
  if(modal?.t==="addCrew")    return <Modal title="모임 만들기" onClose={close}><CrewForm {...props}/></Modal>;
  if(modal?.t==="themeDetail")return <Modal title={modal.d?.title} onClose={close} wide><ThemeDetail d={modal.d} {...props}/></Modal>;
  return null;
}

function Dash({me,records,themes,schedules,goPage,setModal}){
  const myR=records.filter(r=>Array.isArray(r.mbs)&&r.mbs.includes(String(me.id)));
  const wins=myR.filter(r=>r.res==="성공").length;
  const mvps=myR.filter(r=>String(r.mvp)===String(me.id)).length;
  const t=TYPES[me.type]||{};
  return(
    <div className="fade">
      <div style={{marginBottom:24}}><h1 style={{fontSize:24,fontWeight:900}}>대시보드</h1><p style={{fontSize:13,color:C.muted}}>환영합니다, 탐정님.</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[{l:"총 플레이",v:`${myR.length}회`,ic:"🎭",c:C.gold},{l:"성공률",v:myR.length?`${Math.round(wins/myR.length*100)}%`:"—",ic:"✅",c:C.green},{l:"MVP",v:`${mvps}회`,ic:"🏆",c:"#D97706"}].map(x=>(
          <Card key={x.l} style={{textAlign:"center",padding:"16px 12px"}}><div style={{fontSize:22}}>{x.ic}</div><div style={{fontSize:22,fontWeight:900,color:x.c}}>{x.v}</div><div style={{fontSize:11,color:C.muted}}>{x.l}</div></Card>
        ))}
      </div>
    </div>
  );
}

function MyPage({me,records,themes,setModal,setRecords}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>마이페이지</h1><p>마이페이지 렌더링 영역입니다.</p></div>);
}

function Friends({me,mbs,setMbs,records}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>친구 &amp; 궁합</h1><p>ID검색 및 궁합 매칭 기능</p></div>);
}

function Crew({me,mbs,setModal,records}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>모임 관리</h1><p>크루 구성 및 AI 시너지</p></div>);
}

function ThemeDB({me,themes,setThemes,records,setModal}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>테마 DB</h1><Btn onClick={()=>setModal({t:"addTheme"})}>+ 테마 제보</Btn></div>);
}

function Schedule({me,mbs,schedules,setSchedules,themes,setModal}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>일정·모집</h1><Btn onClick={()=>setModal({t:"addSch"})}>+ 일정 등록</Btn></div>);
}

function AIRec({me,themes,records}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>AI 추천</h1><p>Gemini AI 기반 테마 추천</p></div>);
}

function HoF({mbs,records}){
  return(<div className="fade"><h1 style={{fontSize:24,fontWeight:900}}>명예의 전당</h1><p>MVP 랭킹 시스템</p></div>);
}

// ── 폼 플레이스홀더 (기존 UI 로직 유지) ──────────────────────────────────
function RecordForm({close}){ return <div style={{padding:20}}><p>기록 추가 폼</p><Btn onClick={close}>닫기</Btn></div>; }
function ThemeForm({close}){ return <div style={{padding:20}}><p>테마 제보 폼</p><Btn onClick={close}>닫기</Btn></div>; }
function SchForm({close}){ return <div style={{padding:20}}><p>일정 등록 폼</p><Btn onClick={close}>닫기</Btn></div>; }
function CrewForm({close}){ return <div style={{padding:20}}><p>크루 모집 폼</p><Btn onClick={close}>닫기</Btn></div>; }
function ThemeDetail({close}){ return <div style={{padding:20}}><p>테마 상세 및 후기</p><Btn onClick={close}>닫기</Btn></div>; }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
